<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MediCart Dashboard - Complete Medical Shop and Inventory Analytics Portal">
  <title>MediCart | Dashboard</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }
    .db-card {
      padding: var(--space-lg);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .db-card__icon {
      width: 46px;
      height: 46px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      flex-shrink: 0;
    }
    .db-card__val {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--gray-800);
      line-height: 1.2;
    }
    .db-card__lbl {
      font-size: 0.75rem;
      color: var(--gray-500);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }
    
    .dashboard-sections {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    @media (max-width: 1024px) {
      .dashboard-sections {
        grid-template-columns: 1fr;
      }
    }
    
    .section-card {
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .section-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
    }
    .section-card__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--gray-800);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-card__header-link {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--primary-600);
    }
    .section-card__header-link:hover {
      text-decoration: underline;
    }

    /* Table styling */
    .db-table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius-lg);
    }
    .db-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .db-table th {
      padding: 0.75rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--gray-100);
      color: var(--gray-600);
    }
    .db-table td {
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
    }
    .db-table tbody tr:hover {
      background: var(--gray-50);
    }
    
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-sm);
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: left;
      width: 100%;
    }
    .action-btn:hover {
      border-color: var(--primary-400);
      background: var(--primary-50);
      transform: translateY(-1px);
    }
    .action-btn__icon {
      font-size: 1.25rem;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn__content {
      display: flex;
      flex-direction: column;
    }
    .action-btn__title {
      font-weight: 600;
      color: var(--gray-800);
      font-size: 0.875rem;
      line-height: 1.2;
    }
    .action-btn__desc {
      font-size: 0.75rem;
      color: var(--gray-500);
    }

    /* Warning Items List */
    .warning-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .warning-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0.875rem;
      background: var(--gray-50);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--warning);
      font-size: 0.8125rem;
    }
    .warning-item--danger {
      border-left-color: var(--danger);
    }
    .warning-item__name {
      font-weight: 600;
      color: var(--gray-800);
    }
    .warning-item__detail {
      font-size: 0.75rem;
      color: var(--gray-500);
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="app-layout" id="appRoot">
    <div id="pageContent">
      
      <!-- Stats Counters Grid -->
      <div class="dashboard-grid">
        <div class="glass-card db-card animate-fadeInUp delay-1">
          <div class="db-card__icon" style="background:#dbeafe; color:#2563eb;">💰</div>
          <div>
            <div class="db-card__val" id="dbTodaySales">₹0</div>
            <div class="db-card__lbl">Today's Sales</div>
          </div>
        </div>
        <div class="glass-card db-card animate-fadeInUp delay-2">
          <div class="db-card__icon" style="background:#d1fae5; color:#059669;">🧾</div>
          <div>
            <div class="db-card__val" id="dbTodayInvoices">0</div>
            <div class="db-card__lbl">Today's Bills</div>
          </div>
        </div>
        <div class="glass-card db-card animate-fadeInUp delay-3">
          <div class="db-card__icon" style="background:#fef3c7; color:#d97706;">💊</div>
          <div>
            <div class="db-card__val" id="dbTotalMedicines">0</div>
            <div class="db-card__lbl">Medicines In Stock</div>
          </div>
        </div>
        <div class="glass-card db-card animate-fadeInUp delay-4">
          <div class="db-card__icon" style="background:#fee2e2; color:#dc2626;">⚠️</div>
          <div>
            <div class="db-card__val" id="dbLowStock">0</div>
            <div class="db-card__lbl">Low / No Stock</div>
          </div>
        </div>
      </div>

      <!-- Main Section Layout -->
      <div class="dashboard-sections">
        
        <!-- Left: Recent Invoices -->
        <div class="flex flex-col gap-lg">
          <div class="glass-card glass-card--static section-card animate-fadeInUp">
            <div class="section-card__header">
              <h3 class="section-card__title">🧾 Recent Billing Transactions</h3>
              <a href="/reports" class="section-card__header-link">View Sales History →</a>
            </div>
            
            <div class="db-table-wrapper">
              <table class="db-table" id="dbRecentTable">
                <thead>
                  <tr>
                    <th>Invoice #</th>
                    <th>Customer</th>
                    <th>Items Count</th>
                    <th>Total (₹)</th>
                    <th>Payment</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="dbRecentBody">
                  <tr>
                    <td colspan="6" class="text-muted text-center" style="padding: 2rem;">Loading recent bills...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Right Side: Quick Actions & Inventory Warnings -->
        <div class="flex flex-col gap-lg">
          
          <!-- Quick Actions -->
          <div class="glass-card glass-card--static section-card animate-fadeInUp">
            <div class="section-card__header">
              <h3 class="section-card__title">⚡ Quick Actions</h3>
            </div>
            <div class="quick-actions">
              <button class="action-btn" onclick="window.location.href='/billing'">
                <div class="action-btn__icon" style="background:#ecfeff; color:#0891b2;">💵</div>
                <div class="action-btn__content">
                  <span class="action-btn__title">New Invoice</span>
                  <span class="action-btn__desc">Open billing terminal</span>
                </div>
              </button>
              <button class="action-btn" onclick="window.location.href='/medicines'">
                <div class="action-btn__icon" style="background:#f0fdf4; color:#16a34a;">💊</div>
                <div class="action-btn__content">
                  <span class="action-btn__title">Manage Stock</span>
                  <span class="action-btn__desc">View/Add medicines</span>
                </div>
              </button>
              <button class="action-btn" onclick="window.location.href='/reports'">
                <div class="action-btn__icon" style="background:#fef3c7; color:#d97706;">📈</div>
                <div class="action-btn__content">
                  <span class="action-btn__title">Analytics & Reports</span>
                  <span class="action-btn__desc font-semibold">View sales & GST reports</span>
                </div>
              </button>
            </div>
          </div>

          <!-- Inventory Alerts -->
          <div class="glass-card glass-card--static section-card animate-fadeInUp">
            <div class="section-card__header">
              <h3 class="section-card__title">🔔 Stock Alerts</h3>
            </div>
            <div class="warning-list" id="dbAlertsList">
              <p class="text-muted text-center" style="padding: 1rem;">Loading inventory alerts...</p>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
    if (!AuthManager.isLoggedIn()) {
      window.location.href = '/login';
    } else {
      initApp('Dashboard', 'Overview of pharmacy operations');
    }

    async function loadDashboardData() {
      try {
        const [medStats, invStats, invoiceRes] = await Promise.all([
          api.getMedicineStats().catch(err => ({ totalMedicines: 0, lowStock: 0, outOfStock: 0, expired: 0, categoryStats: [] })),
          api.getInvoiceStats().catch(err => ({ todaySales: 0, todayInvoiceCount: 0, totalInvoices: 0, totalRevenue: 0 })),
          api.getInvoices(1, 5).catch(err => ({ invoices: [], total: 0 }))
        ]);

        // Populate Stats
        animateCounter(document.getElementById('dbTodaySales'), Math.round(invStats.todaySales || 0), '₹');
        animateCounter(document.getElementById('dbTodayInvoices'), invStats.todayInvoiceCount || 0);
        animateCounter(document.getElementById('dbTotalMedicines'), medStats.totalMedicines || 0);
        animateCounter(document.getElementById('dbLowStock'), (medStats.lowStock || 0) + (medStats.outOfStock || 0));

        // Populate Recent Invoices
        const tbody = document.getElementById('dbRecentBody');
        const invoices = invoiceRes.invoices || [];
        if (invoices.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="text-muted text-center" style="padding: 1.5rem;">No recent bills generated today.</td></tr>`;
        } else {
          tbody.innerHTML = invoices.map(inv => {
            const dateStr = new Date(inv.createdAt).toLocaleDateString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
            const badgeClass = inv.status === 'completed' ? 'badge-success' : 'badge-danger';
            return `
              <tr>
                <td><strong>${inv.invoiceNumber}</strong><br><span class="text-xs text-muted">${dateStr}</span></td>
                <td>${inv.customer?.name || 'Walk-in Customer'}</td>
                <td>${inv.items?.length || 0}</td>
                <td>₹${inv.grandTotal?.toFixed(2)}</td>
                <td><span style="text-transform: uppercase; font-size: 0.75rem; font-weight: 600;">${inv.paymentMethod}</span></td>
                <td><span class="badge ${badgeClass}">${inv.status}</span></td>
              </tr>
            `;
          }).join('');
        }

        // Populate Stock Alerts
        const alertsList = document.getElementById('dbAlertsList');
        // Fetch the lowest stock medicines
        const medicinesRes = await api.getMedicines(1, 10);
        const lowStockItems = (medicinesRes.medicines || [])
          .filter(m => m.stock <= (m.lowStockThreshold || 10))
          .slice(0, 5);

        if (lowStockItems.length === 0) {
          alertsList.innerHTML = `
            <div style="text-align: center; color: var(--success); font-weight: 500; font-size: 0.8125rem; padding: 1rem;">
              ✅ All stock levels are healthy!
            </div>`;
        } else {
          alertsList.innerHTML = lowStockItems.map(m => {
            const isDanger = m.stock === 0;
            return `
              <div class="warning-item ${isDanger ? 'warning-item--danger' : ''}">
                <div>
                  <span class="warning-item__name">${m.name}</span><br>
                  <span class="warning-item__detail">${m.category} | ${m.manufacturer}</span>
                </div>
                <span class="badge ${isDanger ? 'badge-danger' : 'badge-warning'}">Stock: ${m.stock} ${m.unit}</span>
              </div>
            `;
          }).join('');
        }
      } catch (err) {
        console.error('Error loading dashboard data:', err);
      }
    }

    loadDashboardData();
  </script>
</body>
</html>
