<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCart | Medicines</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl);flex-wrap:wrap;gap:var(--space-md);}
    .page-header__title{font-family:var(--font-display);font-weight:800;font-size:1.375rem;color:var(--gray-800);}
    .filter-bar{display:flex;gap:var(--space-sm);margin-bottom:var(--space-lg);flex-wrap:wrap;}
    .filter-input{padding:0.5rem 1rem;border:1.5px solid var(--gray-200);border-radius:var(--radius-full);font-size:0.85rem;background:var(--bg-secondary);color:var(--gray-800);outline:none;min-width:250px;font-family:var(--font-primary);transition:border-color var(--transition-fast), box-shadow var(--transition-fast);}
    .filter-input:focus{border-color:var(--primary-400);box-shadow:0 0 0 3px rgba(16,185,129,0.1);}
    .filter-input:hover{border-color:var(--gray-300);}
    .med-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-lg);}
    .med-card{padding:1.25rem;transition:all var(--transition-base);position:relative;overflow:hidden;cursor:default;}
    .med-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-card-hover);}
    .med-card__header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem;}
    .med-card__emoji{width:44px;height:44px;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--primary-100),var(--primary-200));display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
    .med-card__name{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--gray-800);margin-bottom:0.125rem;}
    .med-card__generic{font-size:0.75rem;color:var(--gray-500);}
    .med-card__meta{display:flex;flex-wrap:wrap;gap:0.375rem;margin:0.75rem 0;}
    .med-card__price{font-family:var(--font-display);font-size:1.25rem;font-weight:800;color:var(--primary-600);}
    .med-card__mrp{font-size:0.75rem;color:var(--gray-400);text-decoration:line-through;margin-left:0.375rem;}
    .med-card__footer{display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:1px solid var(--gray-100);}
    .stock-bar{width:100%;height:4px;background:var(--gray-200);border-radius:var(--radius-full);margin-top:0.5rem;overflow:hidden;}
    .stock-bar__fill{height:100%;border-radius:var(--radius-full);transition:width 0.6s ease;}
    .expiry-badge{font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:var(--radius-full);font-weight:600;white-space:nowrap;}
    .expiry-ok{background:#dcfce7;color:#166534;} .expiry-soon{background:#fef3c7;color:#92400e;} .expiry-expired{background:#fee2e2;color:#991b1b;}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--gray-400);}
    .empty-state__icon{font-size:4rem;margin-bottom:1rem;opacity:0.5;}
    @media(max-width:768px){.med-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:480px){.med-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="app-layout" id="appRoot">
    <div id="pageContent">
      <div class="page-header">
        <div><h2 class="page-header__title">Medicine Catalog</h2><p class="text-muted text-sm">Manage your medicine inventory</p></div>
        <div class="page-header__actions">
          <button class="btn btn-primary" onclick="document.getElementById('addMedModal').classList.remove('hidden')">+ Add Medicine</button>
        </div>
      </div>
      <div class="filter-bar">
        <input type="text" class="filter-input" id="medSearch" placeholder="🔍 Search medicines...">
        <select class="filter-input" id="medCategory" style="min-width:150px;cursor:pointer;">
          <option value="">All Categories</option>
          <option>Tablets</option><option>Capsules</option><option>Syrups</option>
          <option>Ointments</option><option>Supplements</option><option>First Aid</option>
          <option>Ayurvedic</option><option>Injections</option><option>Drops</option>
          <option>Inhalers</option><option>Surgical</option><option>Other</option>
        </select>
      </div>
      <div class="med-grid" id="medGrid"><div class="empty-state"><div class="empty-state__icon">💊</div><p>Loading medicines...</p></div></div>
    </div>
  </div>

  <!-- Add Medicine Modal -->
  <div class="modal-overlay hidden" id="addMedModal">
    <div class="modal modal--lg">
      <div class="modal-header"><h3 class="modal-header__title">💊 Add New Medicine</h3><button class="btn btn-ghost" onclick="document.getElementById('addMedModal').classList.add('hidden')">✕</button></div>
      <div class="modal-body">
        <form style="display:flex;flex-direction:column;gap:1rem;" id="addMedForm">
          <div class="form-row"><div class="form-group"><label class="form-label">Name <span class="text-danger">*</span></label><input class="form-input" name="name" required></div><div class="form-group"><label class="form-label">Generic Name</label><input class="form-input" name="genericName"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Category</label><select class="form-input" name="category"><option>Tablets</option><option>Capsules</option><option>Syrups</option><option>Ointments</option><option>Supplements</option><option>First Aid</option><option>Ayurvedic</option><option>Other</option></select></div><div class="form-group"><label class="form-label">Manufacturer</label><input class="form-input" name="manufacturer"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Selling Price <span class="text-danger">*</span></label><input class="form-input" name="sellingPrice" type="number" step="0.01" required></div><div class="form-group"><label class="form-label">MRP</label><input class="form-input" name="mrp" type="number" step="0.01"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Stock <span class="text-danger">*</span></label><input class="form-input" name="stock" type="number" required></div><div class="form-group"><label class="form-label">GST %</label><input class="form-input" name="gstPercent" type="number" value="12"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Batch No</label><input class="form-input" name="batchNo"></div><div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" name="expiryDate" type="date"></div></div>
          <button type="submit" class="btn btn-primary btn-lg w-full">Add Medicine</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
    if(!AuthManager.isLoggedIn()){window.location.href='/login';}
    else{initApp('Medicines','Medicine Catalog');}

    const user = AuthManager.getUser();
    if (user && user.role === 'viewer') {
      const actionsEl = document.querySelector('.page-header__actions');
      if (actionsEl) actionsEl.style.display = 'none';
    }

    const catEmojis={Tablets:'💊',Capsules:'💉',Syrups:'🧴',Injections:'💉',Ointments:'🧪',Drops:'💧',Inhalers:'🌬️',Supplements:'🍊','First Aid':'🩹',Surgical:'🏥',Ayurvedic:'🌿',Other:'📦'};

    function getExpiryStatus(d){if(!d)return{cls:'expiry-ok',txt:'N/A'};const diff=(new Date(d)-new Date())/(1000*60*60*24);if(diff<0)return{cls:'expiry-expired',txt:'Expired'};if(diff<90)return{cls:'expiry-soon',txt:Math.round(diff)+'d left'};return{cls:'expiry-ok',txt:'Valid'};}

    function renderMeds(meds){
      const grid=document.getElementById('medGrid');
      if(!meds.length){grid.innerHTML='<div class="empty-state"><div class="empty-state__icon">🔍</div><p>No medicines found</p></div>';return;}
      grid.innerHTML=meds.map((m,i)=>{
        const exp=getExpiryStatus(m.expiryDate);
        const stockPct=Math.min((m.stock/500)*100,100);
        const stockColor=m.stock<=0?'var(--danger)':m.stock<=10?'var(--warning)':'var(--primary-500)';
        return`<div class="glass-card med-card animate-fadeInUp delay-${Math.min(i%6+1,6)}">
          <div class="med-card__header"><div class="med-card__emoji">${catEmojis[m.category]||'📦'}</div><span class="expiry-badge ${exp.cls}">${exp.txt}</span></div>
          <div class="med-card__name">${m.name}</div>
          <div class="med-card__generic">${m.genericName||m.category} · ${m.manufacturer||''}</div>
          <div class="med-card__meta"><span class="badge badge-info">GST ${m.gstPercent||12}%</span>${m.prescription?'<span class="badge badge-warning">Rx</span>':''}<span class="badge ${m.stock<=0?'badge-danger':m.stock<=10?'badge-warning':'badge-success'}">${m.stock<=0?'Out of Stock':'Stock: '+m.stock}</span></div>
          <div class="med-card__footer"><div><span class="med-card__price">₹${m.sellingPrice}</span>${m.mrp?'<span class="med-card__mrp">₹'+m.mrp+'</span>':''}</div><span class="text-xs text-muted">${m.unit||'strip'}</span></div>
          <div class="stock-bar"><div class="stock-bar__fill" style="width:${stockPct}%;background:${stockColor};"></div></div>
        </div>`}).join('');
    }

    let allMeds=[];
    async function loadMeds(){
      try{const data=await api.getMedicines(1,100);allMeds=data.medicines||[];renderMeds(allMeds);}
      catch(e){document.getElementById('medGrid').innerHTML='<div class="empty-state"><div class="empty-state__icon">⚠️</div><p>Failed to load</p></div>';}
    }
    loadMeds();

    document.getElementById('medSearch').addEventListener('input',function(){
      const q=this.value.toLowerCase();const cat=document.getElementById('medCategory').value;
      renderMeds(allMeds.filter(m=>(m.name.toLowerCase().includes(q)||m.genericName?.toLowerCase().includes(q)||m.manufacturer?.toLowerCase().includes(q))&&(!cat||m.category===cat)));
    });
    document.getElementById('medCategory').addEventListener('change',function(){
      const q=document.getElementById('medSearch').value.toLowerCase();const cat=this.value;
      renderMeds(allMeds.filter(m=>(m.name.toLowerCase().includes(q)||m.genericName?.toLowerCase().includes(q))&&(!cat||m.category===cat)));
    });

    document.getElementById('addMedForm').addEventListener('submit',async(e)=>{
      e.preventDefault();const fd=new FormData(e.target);const data=Object.fromEntries(fd);
      data.sellingPrice=parseFloat(data.sellingPrice);data.mrp=parseFloat(data.mrp)||data.sellingPrice;
      data.stock=parseInt(data.stock);data.gstPercent=parseInt(data.gstPercent)||12;
      try{await api.createMedicine(data);
        showToast('Medicine added!','success');document.getElementById('addMedModal').classList.add('hidden');e.target.reset();loadMeds();
      }catch(err){showToast('Failed to add medicine','error');}
    });
  </script>
</body>
</html>
